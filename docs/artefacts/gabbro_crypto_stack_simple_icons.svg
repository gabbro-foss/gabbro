<?xml version="1.0" encoding="UTF-8"?>
<!--
  Gabbro crypto stack - SIMPLE view WITH ICONS + plain-language LAYER bands.
  Hand-authored, self-contained SVG (this file IS the source; there is no .dot).
  Reflects file-format VERSION 11 (ADR-018): the vault key is derived straight from
  the Argon2id output via HKDF; the X25519 + ML-KEM-1024 hybrid layer was removed.
  Palette: viridis (perceptually uniform, colour-blind + greyscale friendly, ADR-003).
  6 layers map dark->light top->bottom. Meaning never rests on colour alone: each
  step also has an icon, a name, and a plain-language layer label. Not for review.
  Aspect ~A4 portrait so the A4 PNG/PDF render fills the page.
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="930" height="1300" viewBox="0 0 930 1300" font-family="Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7.5" refY="5" orient="auto">
      <path d="M1,1 L8,5 L1,9" fill="none" stroke="#666" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrK" markerWidth="10" markerHeight="10" refX="7.5" refY="5" orient="auto">
      <path d="M1,1 L8,5 L1,9" fill="none" stroke="#22794f" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <!-- icons in a 32x32 box, stroked; scaled up where used -->
    <g id="ic_dots" fill="#333" stroke="none">
      <circle cx="5" cy="16" r="2.6"/><circle cx="13" cy="16" r="2.6"/>
      <circle cx="21" cy="16" r="2.6"/><circle cx="29" cy="16" r="2.6"/>
    </g>
    <g id="ic_hourglass" fill="none" stroke="#333" stroke-width="1.7" stroke-linejoin="round">
      <path d="M7,5 H25 M7,27 H25"/>
      <path d="M8,6 L16,16 L8,26" fill="#333" fill-opacity="0.12"/>
      <path d="M24,6 L16,16 L24,26" fill="#333" fill-opacity="0.12"/>
    </g>
    <g id="ic_funnel" fill="#333" fill-opacity="0.12" stroke="#333" stroke-width="1.7" stroke-linejoin="round">
      <path d="M5,7 H27 L18,18 V26 H14 V18 Z"/>
    </g>
    <g id="ic_usbkey" fill="none" stroke="#333" stroke-width="1.7" stroke-linejoin="round">
      <rect x="11" y="4" width="10" height="24" rx="3" fill="#333" fill-opacity="0.10"/>
      <circle cx="16" cy="10" r="2.2"/><path d="M13,17 H19 M13,21 H19"/>
    </g>
    <g id="ic_key" fill="none" stroke="#333" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="11" r="5" fill="#333" fill-opacity="0.10"/>
      <path d="M13.5,14.5 L26,27"/><path d="M21,22 L24,19 M23.5,24.5 L26.5,21.5"/>
    </g>
    <g id="ic_lock" fill="none" stroke="#333" stroke-width="1.7" stroke-linejoin="round">
      <path d="M10,15 V11 a6,6 0 0 1 12,0 V15"/>
      <rect x="8" y="15" width="16" height="13" rx="2.5" fill="#333" fill-opacity="0.10"/>
      <circle cx="16" cy="20" r="1.6" fill="#333" stroke="none"/><path d="M16,21.5 V24"/>
    </g>
    <g id="ic_doc" fill="none" stroke="#333" stroke-width="1.7" stroke-linejoin="round">
      <path d="M9,4 H21 L25,8 V28 H9 Z" fill="#333" fill-opacity="0.08"/>
      <path d="M21,4 V8 H25"/><path d="M12,14 H21 M12,18 H21 M12,22 H18"/>
    </g>
  </defs>

  <text x="465" y="54" text-anchor="middle" font-size="33" font-weight="bold" fill="#222">How Gabbro protects your vault</text>
  <text x="465" y="86" text-anchor="middle" font-size="18" fill="#666">the simple picture &#183; read the layer names down the left, or the steps down the middle</text>

  <!-- ===================== background layer bands (viridis, light) ===================== -->
  <g stroke="none">
    <rect x="10" y="104"  width="910" height="150" rx="18" fill="#DDD1E0"/>
    <rect x="10" y="268"  width="910" height="200" rx="18" fill="#DDDBE8"/>
    <rect x="10" y="482"  width="910" height="192" rx="18" fill="#D7EBEA"/>
    <rect x="10" y="688"  width="910" height="188" rx="18" fill="#DBF2E7"/>
    <rect x="10" y="890"  width="910" height="200" rx="18" fill="#EFF8DB"/>
    <rect x="10" y="1104" width="910" height="168" rx="18" fill="#FEFBD8"/>
  </g>
  <line x1="150" y1="112" x2="150" y2="1264" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- ===================== layer names (left column, viridis dark) ===================== -->
  <g text-anchor="middle" font-weight="bold" font-size="24">
    <text x="79" y="187" fill="#440154">Unlock</text>
    <text x="79" y="360" fill="#453781">Brute-force</text><text x="79" y="388" fill="#453781">shield</text>
    <text x="79" y="570" fill="#15716c">Key</text><text x="79" y="598" fill="#15716c">derivation</text>
    <text x="79" y="790" fill="#22794f">Keys</text>
    <text x="79" y="998" fill="#566f1c">Encryption</text>
    <text x="79" y="1187" fill="#7d7010">Vault</text>
  </g>

  <!-- ===================== connectors ===================== -->
  <g stroke="#666" stroke-width="1.8" fill="none">
    <path d="M545,236 V290" marker-end="url(#arr)"/>
    <path d="M545,446 V504" marker-end="url(#arr)"/>
    <path d="M545,652 C545,684 425,678 425,710" marker-end="url(#arr)"/>
    <path d="M425,854 C425,886 545,880 545,912" marker-end="url(#arr)"/>
    <path d="M545,1068 V1120" marker-end="url(#arr)"/>
  </g>
  <path d="M684,782 H661" stroke="#22794f" stroke-width="1.8" fill="none" stroke-dasharray="6 4" marker-end="url(#arrK)"/>

  <!-- ===================== step boxes ===================== -->
  <!-- 1. passphrase -->
  <rect x="310" y="122" width="470" height="114" rx="12" fill="#B499BB" stroke="#3a3a3a"/>
  <use xlink:href="#ic_dots" transform="translate(334,160) scale(2.0)"/>
  <text x="436" y="170" font-size="26" font-weight="bold" fill="#1c1c1c">Your passphrase</text>
  <text x="436" y="206" font-size="20" fill="#222">the one secret only you know</text>

  <!-- 2. Argon2id -->
  <rect x="310" y="290" width="470" height="156" rx="12" fill="#B4AFCD" stroke="#3a3a3a"/>
  <use xlink:href="#ic_hourglass" transform="translate(334,334) scale(2.0)"/>
  <text x="436" y="332" font-size="26" font-weight="bold" fill="#1c1c1c">Argon2id</text>
  <text x="436" y="362" font-size="20" font-style="italic" fill="#453781">a password-hardening function</text>
  <text x="436" y="392" font-size="20" fill="#222">turns your passphrase into a key,</text>
  <text x="436" y="422" font-size="20" fill="#222">so slow it's brute-force resistant</text>

  <!-- 3. HKDF -->
  <rect x="310" y="504" width="470" height="148" rx="12" fill="#A6D3D1" stroke="#3a3a3a"/>
  <use xlink:href="#ic_funnel" transform="translate(334,548) scale(2.0)"/>
  <text x="436" y="546" font-size="26" font-weight="bold" fill="#1c1c1c">HKDF</text>
  <text x="436" y="576" font-size="20" font-style="italic" fill="#15716c">a key-derivation function</text>
  <text x="436" y="606" font-size="20" fill="#222">derives your vault key straight</text>
  <text x="436" y="636" font-size="20" fill="#222">from the Argon2id output</text>

  <!-- 4. Master key -->
  <rect x="190" y="710" width="470" height="144" rx="12" fill="#AEE2C9" stroke="#3a3a3a"/>
  <use xlink:href="#ic_key" transform="translate(214,752) scale(2.0)"/>
  <text x="316" y="760" font-size="26" font-weight="bold" fill="#1c1c1c">Master key</text>
  <text x="316" y="796" font-size="20" fill="#222">opens your vault — and nothing</text>
  <text x="316" y="826" font-size="20" fill="#222">on your device stores it</text>

  <!-- 4b. YubiKey (optional) -->
  <rect x="684" y="704" width="216" height="156" rx="12" fill="#AEE2C9" stroke="#22794f" stroke-width="1.6" stroke-dasharray="7 4"/>
  <use xlink:href="#ic_usbkey" transform="translate(702,756) scale(1.7)"/>
  <text x="764" y="752" font-size="19" font-weight="bold" fill="#1c1c1c">YubiKey</text>
  <text x="764" y="776" font-size="16" font-style="italic" fill="#22794f">a physical key</text>
  <text x="764" y="800" font-size="16" fill="#222">optional — plug</text>
  <text x="764" y="822" font-size="16" fill="#222">in or tap</text>

  <!-- 5. AES -->
  <rect x="310" y="912" width="470" height="156" rx="12" fill="#DBF0AF" stroke="#3a3a3a"/>
  <use xlink:href="#ic_lock" transform="translate(334,956) scale(2.0)"/>
  <text x="436" y="954" font-size="26" font-weight="bold" fill="#1c1c1c">AES-256-GCM</text>
  <text x="436" y="984" font-size="20" font-style="italic" fill="#566f1c">the encryption itself</text>
  <text x="436" y="1014" font-size="20" fill="#222">scrambles everything in your vault</text>
  <text x="436" y="1044" font-size="20" fill="#222">so only the master key can undo it</text>

  <!-- 6. file -->
  <rect x="310" y="1120" width="470" height="132" rx="12" fill="#FEF5A8" stroke="#3a3a3a"/>
  <use xlink:href="#ic_doc" transform="translate(334,1158) scale(2.0)"/>
  <text x="436" y="1168" font-size="26" font-weight="bold" fill="#1c1c1c">Your .gabbro file</text>
  <text x="436" y="1204" font-size="20" fill="#222">one sealed file on your device —</text>
  <text x="436" y="1232" font-size="20" fill="#222">no servers, no cloud, no account</text>

</svg>
