<svg xmlns="http://www.w3.org/2000/svg" width="337" height="728" viewBox="0 0 337 728" role="img" font-family="system-ui, 'Segoe UI', Roboto, sans-serif">
  <title>Multi-device Vault Sync flow</title>
  <desc>Conceptual flow: an exported vault.gabbro file travels via rsync from Device A through a NAS/cloud relay to Device B, is unlocked with passphrase and YubiKey, leaving the vaults in sync.</desc>
  <defs>
    <marker id="varrow" markerWidth="9" markerHeight="9" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#5C7A3E"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="337" height="728" rx="6" fill="#5C7A3E"/>
  <rect x="8" y="8" width="321" height="712" rx="3" fill="#F8FAEF"/>

  <g transform="translate(145,17) scale(0.46)">
    <g transform="matrix(0.8825,0,0,0.8825,18.23,5)">
      <polygon points="0,40 24,40 24,96 10,102 0,90"         fill="#484844"/>
      <polygon points="24,40 52,40 52,96 24,96"              fill="#5A5A56"/>
      <polygon points="52,40 62,40 72,48 72,96 58,102 52,96" fill="#6C6860"/>
      <polygon points="0,12 18,0 24,0 24,40 0,40"            fill="#3E6030"/>
      <polygon points="24,0 52,0 52,40 24,40"                fill="#5C7A3E"/>
      <polygon points="52,0 62,0 62,40 52,40"                fill="#8ABE64"/>
      <line x1="24" y1="0" x2="24" y2="96" stroke="#2a2a28" stroke-width="0.9" opacity="0.6"/>
      <line x1="52" y1="0" x2="52" y2="96" stroke="#888480" stroke-width="0.7" opacity="0.5"/>
      <circle cx="38" cy="72" r="9" fill="none" stroke="#D4AA55" stroke-width="2.2"/><circle cx="38" cy="72" r="3.5" fill="#D4AA55"/>
    </g>
  </g>

  <text x="168" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#2E3826">Multi-device Vault Sync flow</text>
  <text x="168" y="96" text-anchor="middle" font-size="10" fill="#6B7363">how an exported vault travels A &#8594; B</text>

  <line x1="168" y1="176" x2="168" y2="192" stroke="#5C7A3E" stroke-width="1.6"/>
  <line x1="168" y1="212" x2="168" y2="228" stroke="#5C7A3E" stroke-width="1.6" marker-end="url(#varrow)"/>
  <line x1="168" y1="266" x2="168" y2="282" stroke="#5C7A3E" stroke-width="1.6"/>
  <line x1="168" y1="302" x2="168" y2="318" stroke="#5C7A3E" stroke-width="1.6" marker-end="url(#varrow)"/>
  <line x1="168" y1="382" x2="168" y2="398" stroke="#5C7A3E" stroke-width="1.6"/>
  <line x1="168" y1="418" x2="168" y2="434" stroke="#5C7A3E" stroke-width="1.6" marker-end="url(#varrow)"/>
  <line x1="168" y1="498" x2="168" y2="514" stroke="#5C7A3E" stroke-width="1.6"/>
  <line x1="168" y1="534" x2="168" y2="550" stroke="#5C7A3E" stroke-width="1.6" marker-end="url(#varrow)"/>
  <line x1="168" y1="602" x2="168" y2="630" stroke="#5C7A3E" stroke-width="1.6" marker-end="url(#varrow)"/>

  <rect x="64" y="112" width="208" height="64" rx="10" fill="#FFFFFF" stroke="#5C7A3E" stroke-width="1.4"/>
  <rect x="84" y="124" width="24" height="40" rx="4" fill="#FFFFFF" stroke="#5C7A3E" stroke-width="1.4"/>
  <line x1="90" y1="130" x2="102" y2="130" stroke="#5C7A3E" stroke-width="1.4"/>
  <circle cx="96" cy="158" r="1.6" fill="#5C7A3E"/>
  <text x="122" y="140" font-size="13" font-weight="700" fill="#2E3826">Device A</text>
  <text x="122" y="156" font-size="10" fill="#6B7363">Android phone</text>

  <rect x="68" y="192" width="200" height="20" rx="10" fill="#FFFFFF" stroke="#D9E0C8" stroke-width="1"/>
  <line x1="77" y1="206" x2="87" y2="206" stroke="#5C7A3E" stroke-width="1.4"/>
  <line x1="82" y1="205" x2="82" y2="196" stroke="#5C7A3E" stroke-width="1.4"/>
  <path d="M78.5 199 L85.5 199 L82 194.8 Z" fill="#5C7A3E"/>
  <text x="98" y="206" font-size="9" fill="#2E3826">export vault &#8594; <tspan font-family="'Fira Code', ui-monospace, monospace" font-weight="600">vault.gabbro</tspan></text>

  <rect x="73" y="228" width="190" height="38" rx="8" fill="#EFF3E2" stroke="#5C7A3E" stroke-width="1.2" stroke-dasharray="4 3"/>
  <rect x="86" y="241" width="12" height="9" rx="1" fill="#C9A227"/>
  <path d="M89 241 v-2 a3 3 0 0 1 6 0 v2" fill="none" stroke="#C9A227" stroke-width="1.6"/>
  <circle cx="92" cy="245.5" r="1" fill="#EFF3E2"/>
  <text x="108" y="243" font-size="12" font-weight="700" fill="#2E3826" font-family="'Fira Code', ui-monospace, monospace">vault.gabbro</text>
  <text x="108" y="256" font-size="8" fill="#6B7363" font-family="'Fira Code', ui-monospace, monospace">exported &#183; ciphertext</text>

  <rect x="113" y="282" width="110" height="20" rx="10" fill="#FFFFFF" stroke="#D9E0C8" stroke-width="1"/>
  <g transform="translate(126,292)">
    <path d="M-4.3,-0.8 A4.4,4.4 0 0 1 2.8,-3.4" fill="none" stroke="#5C7A3E" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M1.9,-4.7 l3.1,0.2 l-1.6,2.7 z" fill="#5C7A3E"/>
    <path d="M4.3,0.8 A4.4,4.4 0 0 1 -2.8,3.4" fill="none" stroke="#5C7A3E" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M-1.9,4.7 l-3.1,-0.2 l1.6,-2.7 z" fill="#5C7A3E"/>
  </g>
  <text x="140" y="296" font-size="9" fill="#2E3826"><tspan font-family="'Fira Code', ui-monospace, monospace" font-weight="600">rsync</tspan> &#183; push</text>

  <rect x="64" y="318" width="208" height="64" rx="10" fill="#FFFFFF" stroke="#5C7A3E" stroke-width="1.4"/>
  <path d="M86 356 a9 9 0 0 1 17 -4 a7 7 0 0 1 5 14 H88 a7 7 0 0 1 -2 -10 Z" fill="#FFFFFF" stroke="#5C7A3E" stroke-width="1.4"/>
  <text x="124" y="346" font-size="13" font-weight="700" fill="#2E3826">NAS / Cloud</text>
  <text x="124" y="362" font-size="10" fill="#6B7363">relay storage</text>

  <rect x="113" y="398" width="110" height="20" rx="10" fill="#FFFFFF" stroke="#D9E0C8" stroke-width="1"/>
  <g transform="translate(126,408)">
    <path d="M-4.3,-0.8 A4.4,4.4 0 0 1 2.8,-3.4" fill="none" stroke="#5C7A3E" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M1.9,-4.7 l3.1,0.2 l-1.6,2.7 z" fill="#5C7A3E"/>
    <path d="M4.3,0.8 A4.4,4.4 0 0 1 -2.8,3.4" fill="none" stroke="#5C7A3E" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M-1.9,4.7 l-3.1,-0.2 l1.6,-2.7 z" fill="#5C7A3E"/>
  </g>
  <text x="140" y="412" font-size="9" fill="#2E3826"><tspan font-family="'Fira Code', ui-monospace, monospace" font-weight="600">rsync</tspan> &#183; pull</text>

  <rect x="64" y="434" width="208" height="64" rx="10" fill="#FFFFFF" stroke="#5C7A3E" stroke-width="1.4"/>
  <rect x="82" y="442" width="36" height="26" rx="2.5" fill="#FFFFFF" stroke="#5C7A3E" stroke-width="1.4"/>
  <rect x="97" y="468" width="6" height="5" fill="#5C7A3E"/>
  <line x1="90" y1="475" x2="110" y2="475" stroke="#5C7A3E" stroke-width="1.8" stroke-linecap="round"/>
  <text x="128" y="460" font-size="13" font-weight="700" fill="#2E3826">Device B</text>
  <text x="128" y="476" font-size="10" fill="#6B7363">computer (Linux desktop)</text>

  <rect x="68" y="514" width="200" height="20" rx="10" fill="#FFFFFF" stroke="#D9E0C8" stroke-width="1"/>
  <g transform="translate(82,524)">
    <path d="M-4.3,-0.8 A4.4,4.4 0 0 1 2.8,-3.4" fill="none" stroke="#5C7A3E" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M1.9,-4.7 l3.1,0.2 l-1.6,2.7 z" fill="#5C7A3E"/>
    <path d="M4.3,0.8 A4.4,4.4 0 0 1 -2.8,3.4" fill="none" stroke="#5C7A3E" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M-1.9,4.7 l-3.1,-0.2 l1.6,-2.7 z" fill="#5C7A3E"/>
  </g>
  <text x="96" y="528" font-size="9" fill="#2E3826">sync vault &#8592; <tspan font-family="'Fira Code', ui-monospace, monospace" font-weight="600">vault.gabbro</tspan></text>

  <rect x="64" y="550" width="208" height="52" rx="10" fill="#FFFFFF" stroke="#5C7A3E" stroke-width="1.4"/>
  <rect x="83" y="576" width="13" height="11" rx="1.6" fill="none" stroke="#5C7A3E" stroke-width="1.4"/>
  <path d="M85 576 v-4 a4 4 0 0 1 8 0 v1" fill="none" stroke="#5C7A3E" stroke-width="1.4"/>
  <circle cx="89.5" cy="580.5" r="1.3" fill="#5C7A3E"/>
  <line x1="89.5" y1="581.5" x2="89.5" y2="584" stroke="#5C7A3E" stroke-width="1.2"/>
  <rect x="106" y="566" width="10" height="20" rx="3" fill="#5A5A56" stroke="#2E3826" stroke-width="0.8"/>
  <circle cx="111" cy="569.5" r="1.5" fill="#F8FAEF"/>
  <circle cx="111" cy="579" r="2.6" fill="none" stroke="#D4AA55" stroke-width="1.4"/>
  <circle cx="111" cy="579" r="1" fill="#D4AA55"/>
  <text x="132" y="572" font-size="13" font-weight="700" fill="#2E3826">Unlock vault</text>
  <text x="132" y="586" font-size="9" fill="#6B7363">passphrase + YubiKey</text>

  <rect x="70" y="630" width="196" height="42" rx="11" fill="#5C7A3E"/>
  <path d="M118 651 l5 6 l10 -13" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="140" y="656" font-size="13" font-weight="700" fill="#FFFFFF">Vaults in sync</text>

  <text x="168" y="700" text-anchor="middle" font-size="9" fill="#6B7363">rsync transfers ciphertext only.</text>
</svg>
